<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="shieldGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a75;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield Background -->
  <path d="M 128 10 L 70 45 L 70 110 Q 70 165 128 225 Q 186 165 186 110 L 186 45 Z" 
        fill="url(#shieldGradient)" stroke="none"/>

  <!-- Left Curved Dark Blue Shape -->
  <ellipse cx="92" cy="95" rx="16" ry="32" fill="#062548" opacity="0.8" transform="rotate(-35 92 95)"/>

  <!-- Right Curved Dark Blue Shape -->
  <ellipse cx="164" cy="95" rx="16" ry="32" fill="#062548" opacity="0.8" transform="rotate(35 164 95)"/>

  <!-- Head (Beige) -->
  <circle cx="128" cy="80" r="16" fill="#E8D5B7"/>

  <!-- Body (Dark Blue) -->
  <path d="M 113 98 L 113 128 Q 113 140 128 142 Q 143 140 143 128 L 143 98 Q 135 115 128 120 Q 121 115 113 98 Z" 
        fill="#1a4a75"/>

  <!-- Torch Flame at Top -->
  <g transform="translate(128, 48)">
    <!-- Outer orange flame -->
    <path d="M -7 0 Q -12 6 -11 16 L -4 20 Q 0 22 4 20 L 11 16 Q 12 6 7 0 Q 0 -4 -7 0 Z" 
          fill="#FF9F1C"/>
    
    <!-- Middle orange-yellow -->
    <path d="M -5 2 Q -9 6 -8 14 L -2 18 Q 0 19 2 18 L 8 14 Q 9 6 5 2 Q 0 -1 -5 2 Z" 
          fill="#FFA500"/>
    
    <!-- Inner bright yellow -->
    <path d="M -3 4 Q -5 6 -4 11 L 0 14 L 4 11 Q 5 6 3 4 Q 0 2 -3 4 Z" 
          fill="#FFD700"/>
    
    <!-- Top point -->
    <polygon points="0,-6 1,-10 -1,-6" fill="#FFD700"/>
  </g>

  <!-- Left Star -->
  <g transform="translate(45, 90)">
    <polygon points="0,-10 3,-4 10,-3 5,1 7,9 0,5 -7,9 -5,1 -10,-3 -3,-4" 
             fill="#FFD700"/>
  </g>

  <!-- Right Star -->
  <g transform="translate(211, 90)">
    <polygon points="0,-10 3,-4 10,-3 5,1 7,9 0,5 -7,9 -5,1 -10,-3 -3,-4" 
             fill="#FFD700"/>
  </g>

  <!-- Bottom Ribbons - Left -->
  <g>
    <!-- Outer left ribbon -->
    <path d="M 82 140 Q 65 155 52 165 Q 48 170 45 167 Q 60 155 75 145 Z" 
          fill="#FF8C00"/>
    <path d="M 52 165 Q 42 176 35 185 Q 32 190 30 187 Q 40 175 50 165 Z" 
          fill="#FFA500"/>
    
    <!-- Inner left segments -->
    <rect x="65" y="145" width="5" height="10" fill="#FFA500"/>
    <rect x="58" y="152" width="5" height="10" fill="#FF8C00"/>
    <rect x="51" y="160" width="5" height="10" fill="#FFA500"/>
    <rect x="44" y="168" width="5" height="10" fill="#FF8C00"/>
  </g>

  <!-- Bottom Ribbons - Right -->
  <g>
    <!-- Outer right ribbon -->
    <path d="M 174 140 Q 191 155 204 165 Q 208 170 211 167 Q 196 155 181 145 Z" 
          fill="#FF8C00"/>
    <path d="M 204 165 Q 214 176 221 185 Q 224 190 226 187 Q 216 175 206 165 Z" 
          fill="#FFA500"/>
    
    <!-- Inner right segments -->
    <rect x="186" y="145" width="5" height="10" fill="#FFA500"/>
    <rect x="193" y="152" width="5" height="10" fill="#FF8C00"/>
    <rect x="200" y="160" width="5" height="10" fill="#FFA500"/>
    <rect x="207" y="168" width="5" height="10" fill="#FF8C00"/>
  </g>
</svg>
