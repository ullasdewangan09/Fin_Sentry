services:
  # FastAPI Backend Service
  - type: web
    name: finsentry-api
    env: python
    plan: standard
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    domains:
      - finsentry.com
      - www.finsentry.com
      - api.finsentry.com
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: JWT_SECRET_KEY
        fromSecret: JWT_SECRET_KEY
      - key: GROQ_API_KEY
        fromSecret: GROQ_API_KEY
      - key: OPENAI_API_KEY
        fromSecret: OPENAI_API_KEY
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENV
        value: production
      # Allow cross-origin requests from the production frontend
      - key: CORS_ALLOWED_ORIGINS
        value: "https://app.finsentry.com,https://finsentry.com,https://www.finsentry.com"
    autoDeploy: true
    rootDir: "."

  # Frontend Service (React — served as a Render Static Site)
  - type: static
    name: finsentry-frontend
    buildCommand: >
      npm install &&
      npm run build
    staticPublishPath: "./dist"
    domains:
      - app.finsentry.com
      - www.finsentry.com
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: VITE_API_URL
        value: "https://api.finsentry.com"
    autoDeploy: true
    rootDir: "frontend/fintwin-command-main"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # Optional: Add PostgreSQL for persistent data
  - name: finsentry-db
    databaseName: finsentry_prod
    user: finsentry_user
    plan: standard
    version: "14"
    region: us-east

# Environment-specific secrets to create in Render dashboard:
# JWT_SECRET_KEY - Generate with: openssl rand -base64 32
# GROQ_API_KEY - From https://console.groq.com
# OPENAI_API_KEY - From https://platform.openai.com/api-keys
